services:
  api:
    build: .
    environment:
      DATABASE_URL: sqlite:////data/safemind.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-docker-demo-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
    ports:
      - "8000:8000"
    volumes:
      - safemind_data:/data

volumes:
  safemind_data:
